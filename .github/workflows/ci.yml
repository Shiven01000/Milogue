name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  typecheck-and-lint:
    name: TypeScript + ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0

      - name: Check for committed API keys
        run: |
          if grep -r "OPENAI_API_KEY=sk-" --include="*.ts" --include="*.tsx" --include="*.json" .; then
            echo "ERROR: API key found in source code"
            exit 1
          fi
